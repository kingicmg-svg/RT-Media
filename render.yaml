services:
  - type: web
    name: rtm-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rtm-postgres
          property: connectionString
    disks:
      - name: videos
        mountPath: /var/data/videos
        sizeGB: 20
