<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RTM Admin — Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    input,select,textarea{font-family:inherit}
    .bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.06em}

    /* Login */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:24px}
    #login img{height:56px;margin-bottom:8px}
    #login h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.06em;background:linear-gradient(135deg,#FF7835,#FF3D6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #login input{width:100%;max-width:360px;padding:14px 18px;border:1px solid #333;border-radius:10px;background:#1a1a1a;color:#fff;font-size:15px;outline:none}
    #login input:focus{border-color:#FF7835}
    #login button{width:100%;max-width:360px;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#FF7835,#FF3D6B);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;cursor:pointer}
    #login .err{color:#FF3D6B;font-size:14px}

    /* Shell */
    #shell{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:#111;border-bottom:1px solid #222;position:sticky;top:0;z-index:100}
    .topbar-logo{height:36px}
    .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;background:linear-gradient(135deg,#FF7835,#FF3D6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .topbar-out{padding:8px 18px;border:1px solid #444;border-radius:8px;background:transparent;color:#aaa;font-size:13px;cursor:pointer}
    .topbar-out:hover{border-color:#FF7835;color:#FF7835}

    /* Tabs */
    .tabs{display:flex;gap:8px;padding:24px 28px 0}
    .tab-btn{padding:10px 22px;border:1px solid #333;border-radius:8px;background:transparent;color:#aaa;font-size:14px;cursor:pointer;transition:all .2s}
    .tab-btn.on{background:linear-gradient(135deg,#FF7835,#FF3D6B);border-color:transparent;color:#fff;font-weight:600}
    .tab-btn:hover:not(.on){border-color:#FF7835;color:#FF7835}

    /* Content */
    .content{padding:24px 28px;max-width:1100px}

    /* Cards */
    .booking-card{background:#111;border:1px solid #222;border-radius:14px;margin-bottom:16px;overflow:hidden;transition:border-color .2s}
    .booking-card:hover{border-color:#333}
    .card-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
    .card-conf{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;color:#FF7835;min-width:110px}
    .card-name{flex:1;font-weight:500;font-size:15px}
    .card-date{color:#888;font-size:13px;min-width:120px;text-align:right}
    .card-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
    .s-pending{background:rgba(255,120,53,.15);color:#FF7835}
    .s-confirmed{background:rgba(34,197,94,.15);color:#22c55e}
    .s-rescheduled{background:rgba(99,102,241,.15);color:#818cf8}
    .s-cancelled{background:rgba(239,68,68,.15);color:#f87171}
    .chevron{width:18px;height:18px;color:#555;transition:transform .3s;flex-shrink:0}
    .chevron.open{transform:rotate(180deg)}

    /* Card body */
    .card-body{padding:0 20px 20px;border-top:1px solid #1e1e1e;display:none}
    .card-body.open{display:block}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
    .detail-item label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;display:block;margin-bottom:3px}
    .detail-item span{font-size:14px;color:#ddd;word-break:break-word}
    .action-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
    .btn-confirm{padding:10px 22px;border:none;border-radius:8px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:600;font-size:13px;cursor:pointer}
    .btn-reschedule{padding:10px 22px;border:1px solid #818cf8;border-radius:8px;background:transparent;color:#818cf8;font-weight:600;font-size:13px;cursor:pointer}
    .btn-receipt{padding:10px 22px;border:1px solid #FF7835;border-radius:8px;background:transparent;color:#FF7835;font-weight:600;font-size:13px;cursor:pointer}
    .btn-cancel{padding:10px 22px;border:1px solid #f87171;border-radius:8px;background:transparent;color:#f87171;font-weight:600;font-size:13px;cursor:pointer}
    .btn-confirm:hover{filter:brightness(1.1)}
    .btn-reschedule:hover{background:rgba(129,140,248,.1)}
    .btn-receipt:hover{background:rgba(255,120,53,.1)}
    .btn-cancel:hover{background:rgba(248,113,113,.1)}

    /* Reschedule modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:#111;border:1px solid #333;border-radius:16px;padding:28px;width:100%;max-width:460px}
    .modal h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;margin-bottom:20px;background:linear-gradient(135deg,#FF7835,#FF3D6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .modal label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px;margin-top:14px}
    .modal input{width:100%;padding:12px 14px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;outline:none}
    .modal input:focus{border-color:#FF7835}
    .modal-btns{display:flex;gap:10px;margin-top:20px}
    .modal-btns button{flex:1;padding:12px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer}
    .btn-do{border:none;background:linear-gradient(135deg,#FF7835,#FF3D6B);color:#fff}
    .btn-cancel-modal{border:1px solid #444;background:transparent;color:#aaa}

    /* Toast */
    .toast{position:fixed;bottom:28px;right:28px;background:#111;border:1px solid #333;border-radius:10px;padding:14px 20px;font-size:14px;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.ok{border-color:#22c55e;color:#22c55e}
    .toast.err{border-color:#f87171;color:#f87171}

    /* Empty state */
    .empty{text-align:center;padding:60px 20px;color:#444;font-size:15px}

    /* Stats row */
    .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
    .stat-card{flex:1;min-width:120px;background:#111;border:1px solid #222;border-radius:12px;padding:16px;text-align:center}
    .stat-card .num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;background:linear-gradient(135deg,#FF7835,#FF3D6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .stat-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-top:2px}

    @media(max-width:600px){
      .topbar{padding:12px 16px}
      .tabs{padding:16px 16px 0}
      .content{padding:16px}
      .detail-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login">
  <img src="./RT MEDIA_animate 3.PNG" alt="RT Media"/>
  <h1>Admin Panel</h1>
  <input type="password" id="secretInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button onclick="doLogin()">LOG IN</button>
  <span class="err" id="loginErr"></span>
</div>

<!-- Main shell (hidden until login) -->
<div id="shell">
  <div class="topbar">
    <img class="topbar-logo" src="./RT MEDIA_animate 3.PNG" alt="RT Media"/>
    <span class="topbar-title">BOOKING ADMIN</span>
    <button class="topbar-out" onclick="logout()">Log out</button>
  </div>

  <div class="tabs">
    <button class="tab-btn on" onclick="showTab('all',this)">All</button>
    <button class="tab-btn" onclick="showTab('pending',this)">Pending</button>
    <button class="tab-btn" onclick="showTab('confirmed',this)">Confirmed</button>
    <button class="tab-btn" onclick="showTab('rescheduled',this)">Rescheduled</button>
    <button class="tab-btn" onclick="showTab('production',this)">Production</button>
  </div>

  <div class="content">
    <div class="stats" id="statsRow"></div>
    <div id="bookingList"><div class="empty">Loading bookings…</div></div>
  </div>
</div>

<!-- Reschedule modal -->
<div class="modal-bg" id="rescheduleModal">
  <div class="modal">
    <h3>Reschedule Booking</h3>
    <input type="hidden" id="reschedConf"/>
    <label>New Date</label>
    <input type="date" id="reschedDate"/>
    <label>New Start Time (e.g. 2:00 PM)</label>
    <input type="text" id="reschedTime" placeholder="2:00 PM"/>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-do" onclick="doReschedule()">Send to Client</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "https://rtm-api-abop.onrender.com";
  const RECEIPT_BASE = window.location.origin + "/receipt.html";
  let secret = "";
  let allBookings = [];
  let currentTab = "all";

  function doLogin() {
    secret = document.getElementById("secretInput").value.trim();
    if (!secret) return;
    loadBookings();
  }

  async function loadBookings() {
    try {
      const res = await fetch(`${API}/bookings?secret=${encodeURIComponent(secret)}`);
      if (res.status === 401) {
        document.getElementById("loginErr").textContent = "Wrong password.";
        return;
      }
      allBookings = await res.json();
      document.getElementById("login").style.display = "none";
      document.getElementById("shell").style.display = "block";
      renderStats();
      renderList(currentTab);
    } catch(e) {
      document.getElementById("loginErr").textContent = "Connection failed: " + e.message;
    }
  }

  function renderStats() {
    const total     = allBookings.length;
    const pending   = allBookings.filter(b=>b.status==="pending").length;
    const confirmed = allBookings.filter(b=>b.status==="confirmed").length;
    const cyc       = allBookings.filter(b=>b.type==="cyc").length;
    const revenue   = allBookings.filter(b=>b.status==="confirmed"&&b.grand_total)
                        .reduce((s,b)=>s+parseFloat(b.grand_total||0),0);
    document.getElementById("statsRow").innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total</div></div>
      <div class="stat-card"><div class="num">${pending}</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num">${confirmed}</div><div class="lbl">Confirmed</div></div>
      <div class="stat-card"><div class="num">${cyc}</div><div class="lbl">CYC Bookings</div></div>
      <div class="stat-card"><div class="num">$${revenue.toFixed(0)}</div><div class="lbl">Confirmed Revenue</div></div>
    `;
  }

  function showTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("on"));
    el.classList.add("on");
    renderList(tab);
  }

  function renderList(tab) {
    let list = allBookings;
    if (tab === "pending")    list = list.filter(b=>b.status==="pending");
    if (tab === "confirmed")  list = list.filter(b=>b.status==="confirmed");
    if (tab === "rescheduled")list = list.filter(b=>b.status==="rescheduled");
    if (tab === "production") list = list.filter(b=>b.type==="production");
    const el = document.getElementById("bookingList");
    if (!list.length) { el.innerHTML = '<div class="empty">No bookings here yet.</div>'; return; }
    el.innerHTML = list.map(b => bookingCard(b)).join("");
  }

  function bookingCard(b) {
    const isCyc  = b.type === "cyc";
    const dt     = b.date_str ? new Date(b.date_str+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",year:"numeric",month:"short",day:"numeric"}) : "—";
    const created= new Date(b.created_at).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"});
    const sc     = b.status==="pending"?"s-pending":b.status==="confirmed"?"s-confirmed":b.status==="rescheduled"?"s-rescheduled":"s-cancelled";

    const details = isCyc ? `
      <div class="detail-item"><label>Date</label><span>${dt}</span></div>
      <div class="detail-item"><label>Time</label><span>${b.start_time||"—"}</span></div>
      <div class="detail-item"><label>Duration</label><span>${b.dur_label||""} (${b.hrs||""}h)</span></div>
      <div class="detail-item"><label>Add-ons</label><span>${b.addons||"None"}</span></div>
      <div class="detail-item"><label>Payment</label><span>${b.pay_method||"—"}</span></div>
      <div class="detail-item"><label>Studio</label><span>$${parseFloat(b.studio_total||0).toFixed(2)}</span></div>
      <div class="detail-item"><label>HST (13%)</label><span>$${parseFloat(b.hst||0).toFixed(2)}</span></div>
      <div class="detail-item"><label>Grand Total</label><span>$${parseFloat(b.grand_total||0).toFixed(2)}</span></div>
      <div class="detail-item"><label>Deposit</label><span>$${parseFloat(b.deposit||0).toFixed(2)}</span></div>
      <div class="detail-item"><label>Balance on Arrival</label><span>$${parseFloat(b.balance_due||0).toFixed(2)}</span></div>
    ` : `
      <div class="detail-item"><label>Project Type</label><span>${b.project_type||"—"}</span></div>
      <div class="detail-item"><label>Crew Add-ons</label><span>${b.crew_addons||"None"}</span></div>
      <div class="detail-item"><label>Message</label><span>${b.message||"—"}</span></div>
    `;

    const actions = isCyc ? `
      ${b.status!=="confirmed"?`<button class="btn-confirm" onclick="doConfirm('${b.conf}')">✓ Confirm Booking</button>`:""}
      <button class="btn-reschedule" onclick="openReschedule('${b.conf}')">↗ Reschedule</button>
      <button class="btn-receipt" onclick="window.open('${RECEIPT_BASE}?conf=${b.conf}','_blank')">🧾 Receipt</button>
    ` : `
      ${b.status!=="confirmed"?`<button class="btn-confirm" onclick="doConfirm('${b.conf}')">✓ Mark Received</button>`:""}
    `;

    return `
      <div class="booking-card" id="card-${b.conf}">
        <div class="card-head" onclick="toggleCard('${b.conf}')">
          <span class="card-conf">${b.conf}</span>
          <span class="card-name">${b.name} <span style="color:#666;font-size:12px;font-weight:400">${b.email}</span></span>
          <span class="card-date">${isCyc ? dt : "Inquiry · "+created}</span>
          <span class="card-status ${sc}">${b.status}</span>
          <svg class="chevron" id="chev-${b.conf}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="card-body" id="body-${b.conf}">
          <div class="detail-grid">
            <div class="detail-item"><label>Phone</label><span>${b.phone||"—"}</span></div>
            <div class="detail-item"><label>Submitted</label><span>${created}</span></div>
            ${details}
          </div>
          <div class="action-row">${actions}</div>
        </div>
      </div>
    `;
  }

  function toggleCard(conf) {
    const body = document.getElementById("body-"+conf);
    const chev = document.getElementById("chev-"+conf);
    body.classList.toggle("open");
    chev.classList.toggle("open");
  }

  async function doConfirm(conf) {
    try {
      const res = await fetch(`${API}/confirm`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ conf, secret }),
      });
      const d = await res.json();
      if (!d.ok) throw new Error(d.error);
      showToast("Booking confirmed — client emailed ✓","ok");
      await loadBookings();
    } catch(e) { showToast("Error: "+e.message,"err"); }
  }

  function openReschedule(conf) {
    document.getElementById("reschedConf").value = conf;
    document.getElementById("reschedDate").value = "";
    document.getElementById("reschedTime").value = "";
    document.getElementById("rescheduleModal").classList.add("open");
  }
  function closeModal() {
    document.getElementById("rescheduleModal").classList.remove("open");
  }

  async function doReschedule() {
    const conf     = document.getElementById("reschedConf").value;
    const new_date = document.getElementById("reschedDate").value;
    const new_time = document.getElementById("reschedTime").value.trim();
    if (!new_date || !new_time) { showToast("Fill in both date and time","err"); return; }
    try {
      const res = await fetch(`${API}/reschedule`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ conf, secret, new_date, new_time }),
      });
      const d = await res.json();
      if (!d.ok) throw new Error(d.error);
      closeModal();
      showToast("Reschedule sent to client ✓","ok");
      await loadBookings();
    } catch(e) { showToast("Error: "+e.message,"err"); }
  }

  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + type;
    setTimeout(()=>t.classList.remove("show"), 3500);
  }

  function logout() {
    secret = "";
    document.getElementById("shell").style.display = "none";
    document.getElementById("login").style.display = "flex";
    document.getElementById("secretInput").value = "";
  }

  // Close modal on bg click
  document.getElementById("rescheduleModal").addEventListener("click", function(e){
    if(e.target===this) closeModal();
  });
</script>
</body>
</html>
