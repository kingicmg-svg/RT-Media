    function useInView(t = 0.1) {
      const ref = useRef(null);
      const [v, sv] = useState(false);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) sv(true); }, { threshold: t });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, [t]);
      return [ref, v];
    }

    function mediaUrl(url) {
      if (!url) return "";
      if (/^(https?:|data:|blob:)/i.test(url)) return url;

      return url;

    function cleanText(value) {
      if (typeof value !== "string") return "";

    const PLACEHOLDER_PORTFOLIO_TITLES = new Set([

    function cleanPortfolioTitle(value) {
      const text = cleanText(value);

      return PLACEHOLDER_PORTFOLIO_TITLES.has(text.toLowerCase()) ? "" : text;
    }

    function titleFromMedia(url) {
      const cleanUrl = cleanText(url);
      if (!cleanUrl) return "";
      const withoutQuery = cleanUrl.split("?")[0].split("#")[0];
      const rawName = decodeURIComponent(withoutQuery.split("/").pop() || "");
      const base = rawName.replace(/\.[a-z0-9]+$/i, "").trim();
      return base.replace(/[_]+/g, " ");
    }

    function numberOr(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatClockHour(hour) {
      const normalized = ((hour % 24) + 24) % 24;
      const ampm = normalized >= 12 ? "PM" : "AM";
      const display = normalized % 12 || 12;
      return `${display}:00 ${ampm}`;
    }

    function normalizeCloseHour(openHour, closeHour) {
      return closeHour <= openHour ? closeHour + 24 : closeHour;
    }

    function formatHoldTimer(seconds) {
      const total = Math.max(0, Math.ceil(seconds));
      const minutes = Math.floor(total / 60);
      const remaining = total % 60;
      return `${minutes}:${String(remaining).padStart(2, "0")}`;
    }

    function parseAddonRate(value, fallback = 0) {
      if (typeof value === "number" && Number.isFinite(value)) return value;
      if (typeof value === "string") {
        const cleaned = value.replace(/[^0-9.\-]/g, "");
        const n = Number(cleaned);
        if (Number.isFinite(n)) return n;
      }
      return fallback;
    }

    const AUTO_THUMB_TIME_SECONDS = 70;
    const videoThumbCache = new Map();

    function createVideoThumbnail(src, preferredTime = AUTO_THUMB_TIME_SECONDS) {
      if (!src) return Promise.resolve("");
      if (videoThumbCache.has(src)) return Promise.resolve(videoThumbCache.get(src));

      return new Promise((resolve) => {
        const video = document.createElement("video");
        let finished = false;

        const done = (result) => {
          if (finished) return;
          finished = true;
          cleanup();
          if (result) videoThumbCache.set(src, result);
          resolve(result || "");
        };

        const cleanup = () => {
          video.removeEventListener("loadedmetadata", onLoadedMetadata);
          video.removeEventListener("seeked", onSeeked);
          video.removeEventListener("error", onError);
          try {
            video.pause();
            video.removeAttribute("src");
            video.load();
          } catch {}
        };

        const onError = () => done("");

        const onLoadedMetadata = () => {
          const duration = Number.isFinite(video.duration) ? video.duration : 0;
          const seekTo = duration > 0
            ? Math.min(preferredTime, Math.max(0, duration - 0.4))
            : preferredTime;
          try {
            video.currentTime = seekTo;
          } catch {
            done("");
          }
        };

        const onSeeked = () => {
          try {
            const width = video.videoWidth || 1280;
            const height = video.videoHeight || 720;
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
              done("");
              return;
            }
            ctx.drawImage(video, 0, 0, width, height);
            done(canvas.toDataURL("image/jpeg", 0.86));
          } catch {
            done("");
          }
        };

        video.preload = "metadata";
        video.muted = true;
        video.playsInline = true;
        video.crossOrigin = "anonymous";

        video.addEventListener("loadedmetadata", onLoadedMetadata);
        video.addEventListener("seeked", onSeeked);
        video.addEventListener("error", onError);

        video.src = src;
        video.load();

        setTimeout(() => done(""), 7000);
      });
    }

    /* ── Hero video ───────────────────────────────────────────────────────── */
    function HeroVideo({ src }) {
      const ref = React.useRef(null);
      const loopCount = React.useRef(0);

      React.useEffect(() => {
        const v = ref.current;
        if (!v) return;

        loopCount.current = 0;
        v.muted = true;
        v.setAttribute("muted", "");
        v.playsInline = true;
        v.controls = false;

        let playInterval = null;

        const tryPlay = () => {
          if (loopCount.current >= 5) {
            return;
          }
          if (v.paused || v.ended) {
            v.play().catch(() => {});
          }
        };

        const handleEnded = () => {
          loopCount.current += 1;
          if (loopCount.current < 5) {
            v.currentTime = 0;
            tryPlay();
          } else {
            v.pause();
            if (playInterval) clearInterval(playInterval);
          }
        };

        const handleReady = () => {
          tryPlay();
        };

        v.addEventListener("ended", handleEnded);
        v.addEventListener("loadedmetadata", handleReady);
        v.addEventListener("canplay", handleReady);

        if (v.readyState >= 1) {
          tryPlay();
        }

        playInterval = setInterval(() => {
          if (loopCount.current >= 5) {
            clearInterval(playInterval);
            return;
          }
          tryPlay();
        }, 200);

        return () => {
          v.removeEventListener("ended", handleEnded);
          v.removeEventListener("loadedmetadata", handleReady);
          v.removeEventListener("canplay", handleReady);
          if (playInterval) clearInterval(playInterval);
        };
      }, []);

      return (
        <video
          autoPlay
          muted
          playsInline
          preload="auto"
          controls={false}
          ref={ref}
          disablePictureInPicture
          controlsList="nodownload noplaybackrate noremoteplayback"
          crossOrigin="anonymous"
          src={src}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:.45}}
        />
      );
    }

    /* ── Play button ────────────────────────────────────────────────────────── */
    const PlayBtn = () => (
      <div className="play"><div className="tri"/></div>
    );

    /* ── Blob thumbnail ─────────────────────────────────────────────────────── */
    function BlobThumb({ grad, br, height = 300, src, poster, label, children }) {
      const vidRef = React.useRef(null);
      const [isPlaying, setIsPlaying] = React.useState(false);
      const [videoError, setVideoError] = React.useState(false);
      const [autoPoster, setAutoPoster] = React.useState("");
      const hasVideo = Boolean(src) && !videoError;
      const displayPoster = poster || autoPoster;

      React.useEffect(() => {
        let active = true;
        setAutoPoster("");

        if (poster || !src) {
          return () => {
            active = false;
          };
        }

        createVideoThumbnail(src).then((thumb) => {
          if (!active) return;
          if (thumb) setAutoPoster(thumb);
        });

        return () => {
          active = false;
        };
      }, [src, poster]);

      const togglePlayback = () => {
        if (!hasVideo) return;
        if (isPlaying) {
          if (vidRef.current) {
            vidRef.current.pause();
            vidRef.current.currentTime = 0;
          }
          setIsPlaying(false);
          return;
        }
        setIsPlaying(true);
        requestAnimationFrame(() => {
          if (vidRef.current) {
            vidRef.current.currentTime = 0;
            vidRef.current.play().catch(() => setIsPlaying(false));
          }
        });
      };

      return (
        <div className="blob" style={{ borderRadius: br, background: grad, height, overflow:"hidden", position:"relative", cursor:hasVideo?"pointer":"default" }} onClick={togglePlayback}>
          {displayPoster && (
            <img src={displayPoster} alt={label || "Portfolio thumbnail"} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
          )}
          {hasVideo && isPlaying && (
            <video
              ref={vidRef}
              src={src}
              poster={displayPoster}
              autoPlay
              muted
              loop
              playsInline
              controls={false}
              disablePictureInPicture
              controlsList="nodownload noplaybackrate noremoteplayback"
              onError={() => { setVideoError(true); setIsPlaying(false); }}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}
            />
          )}
          {!displayPoster && !hasVideo && (
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px",textAlign:"center",fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,.68)",letterSpacing:".06em",textTransform:"uppercase"}}>
              Thumbnail Coming Soon
            </div>
          )}
          {hasVideo && !isPlaying && (
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
              <div style={{padding:"10px 18px",borderRadius:999,border:"1px solid rgba(255,255,255,.38)",background:"rgba(0,0,0,.35)",fontFamily:"'DM Sans'",fontSize:12,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#fff"}}>
                Play
              </div>
            </div>
          )}
          {label && (
            <div style={{position:"absolute",bottom:18,left:0,right:0,textAlign:"center"}}>
              <span style={{fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,.65)",fontWeight:300}}>{label}</span>
            </div>
          )}
          {children}
        </div>
      );
    }

    function AnimatedBar({ pct, grad, inView, delay = 0 }) {
      return (

          <div style={{

    function CountUp({ target, suffix="", inView }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!inView) return;
        let start = 0;
        const step = Math.ceil(target / 40);
        const t = setInterval(() => {
          start += step;
          if (start >= target) { setVal(target); clearInterval(t); }
          else setVal(start);
        }, 30);
        return () => clearInterval(t);
      }, [inView, target]);
      return <span>{val}{suffix}</span>;
    }

                    <h3 style={{fontFamily:"'Bebas Neue'",fontSize:32,letterSpacing:".04em",color:"#fff",marginBottom:14}}>{c.title}</h3>
                    <p style={{fontFamily:"'DM Sans'",fontSize:14.5,fontWeight:300,color:"rgba(255,255,255,.46)",lineHeight:1.72,marginBottom:32}}>{c.desc}</p>
                    <span style={{fontFamily:"'DM Sans'",fontSize:14,fontWeight:500,background:c.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                      {c.cta} →
                    </span>
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ══ BOOK SECTION ════════════════════════════════════════════════════════ */
    function BookSection({ tab, setTab, dur, setDur, addons, toggleAddon, cycAddons, toggleCycAddon, cyc, setCyc, proj, setProj, done, setDone, enabledServices, serviceLabels, cycAddonOptions, crewOptions, bookingConfig, studioEmail }) {
      const [ref, inView] = useInView(0.05);
      const [calLink,  setCalLink]  = useState("");
      const [confNum,  setConfNum]  = useState("");
      const [clientCalLink, setClientCalLink] = useState("");
      const tabButtons = [
        { id:"cyc", label:serviceLabels.cyc },
        { id:"production", label:serviceLabels.production },
      ].filter(t => enabledServices[t.id] !== false);

      function makeConfNum() {
        return "RTM-" + Date.now().toString(36).toUpperCase().slice(-6);
      }

      // Build a Google Calendar deep-link — zero API, just their URL scheme
      function buildCalLink({ title, dateObj, startTime, hrs, notes }) {
        if (!dateObj || !startTime) return "";
        const parts = startTime.split(" ");
        const [hStr] = parts[0].split(":");
        let h = parseInt(hStr, 10);
        if (parts[1] === "PM" && h !== 12) h += 12;
        if (parts[1] === "AM" && h === 12) h = 0;
        const pad = n => String(n).padStart(2,"0");
        const yr = dateObj.getFullYear();
        const mo = pad(dateObj.getMonth()+1);
        const dy = pad(dateObj.getDate());
        const s = `${yr}${mo}${dy}T${pad(h)}0000`;
        const e = `${yr}${mo}${dy}T${pad(h+hrs)}0000`;
        return `https://calendar.google.com/calendar/render?action=TEMPLATE`
          + `&text=${encodeURIComponent(title)}`
          + `&dates=${s}/${e}`
          + `&details=${encodeURIComponent(notes)}`
          + `&location=${encodeURIComponent("Round Table Media Studio, Toronto ON")}`;
      }

      const [submitting, setSubmitting] = useState(false);
      const [submitErr,  setSubmitErr]  = useState("");

      async function submitCYC({ selDate, selTime, hrs, durLabel, dueNow, grandTotal, selectedAddons, payMethod }) {
        setSubmitting(true); setSubmitErr("");
        try {
          const dateStr = selDate ? selDate.toLocaleDateString("en-CA") : "";
          const addOnList = selectedAddons.length
            ? selectedAddons.map(id => {
                const addon = cycAddonOptions.find(a=>a.id===id);
                if (!addon) return "";
                const addonRate = parseAddonRate(addon.rate, 0);
                return addonRate > 0 ? `${addon.label} (${money(addonRate)})` : addon.label;
              }).filter(Boolean).join(", ")
            : "None";
          const hourlyRate = numberOr(bookingConfig.hourlyRate, 100);
          const cleaningFee = numberOr(bookingConfig.cleaningFee, 10);
          const hstRate = numberOr(bookingConfig.hstRate, 0.13);
          const addonTotal = selectedAddons.reduce((sum, id) => {
            const addon = cycAddonOptions.find(a => a.id === id);
            return sum + parseAddonRate(addon?.rate, 0);
          }, 0);
          const studio_total = hrs * hourlyRate + cleaningFee + addonTotal;
          const hst          = Math.round(studio_total * hstRate * 100) / 100;
          const res = await fetch(`${API_BASE}/booking`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              name: cyc.name, email: cyc.email, phone: cyc.phone || null,
              date_str: dateStr, start_time: selTime, hrs, dur_label: durLabel,
              addons: addOnList, pay_method: payMethod,
              studio_total, hst, grand_total: grandTotal,
              deposit: 100, balance_due: Math.round((grandTotal - dueNow)*100)/100,
            }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "Server error");

          // Handle different payment methods
          if (payMethod === "paypal") {
            // Redirect to PayPal with amount
            window.location.href = `${PAYMENT.paypal}/${Math.round(dueNow * 100) / 100}`;
            return;
          } else if (payMethod === "apple" || payMethod === "google") {
            // For Apple Pay / Google Pay - use Stripe or show manual payment instructions
            alert(`Please complete payment of $${dueNow.toFixed(2)} using the payment method linked to your device. Confirmation #${data.conf} has been sent to ${cyc.email}`);
          }

          // Build Google Calendar link for the client
          const clientCal = buildCalLink({
            title: "Round Table Media — CYC Wall Booking",
            dateObj: selDate, startTime: selTime, hrs,
            notes: [
              `Conf#: ${data.conf}`, `Duration: ${durLabel} (${hrs}h)`,
              `Add-ons: ${addOnList}`,
              `Deposit paid: $${dueNow.toFixed(2)}`,
              `Balance due on arrival: $${(grandTotal-dueNow).toFixed(2)}`,
              "Questions? bookings@roundtablemedia.ca",
            ].join("\n"),
          });
          setClientCalLink(clientCal);
          setConfNum(data.conf);
          setDone(true);
        } catch(e) {
          setSubmitErr("Booking failed — " + e.message + ". Please email " + (studioEmail || CONTACT_EMAIL));
        } finally {
          setSubmitting(false);
        }
      }

      async function submitProduction() {
        if (!proj.name || !proj.email) { setSubmitErr("Name and email are required."); return; }
        setSubmitting(true); setSubmitErr("");
        try {
          const crewList = addons.length ? addons.join(", ") : "None";
          const res = await fetch(`${API_BASE}/production`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              name: proj.name, email: proj.email, phone: proj.phone || null,
              project_type: proj.service || null, crew_addons: crewList,
              message: proj.message || null,
            }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "Server error");
          setConfNum(data.conf);
          setDone(true);
        } catch(e) {
          setSubmitErr("Submission failed — " + e.message + ". Please email " + (studioEmail || CONTACT_EMAIL));
        } finally {
          setSubmitting(false);
        }
      }

      return (
        <section id="book" className="sec" ref={ref} style={{background:"#fff"}}>
          <div style={{maxWidth:860,margin:"0 auto"}}>
            <p className="sl">Book</p>
            <h2 className="sh" style={{marginBottom:48}}>Let's Work<br/>Together</h2>
            <div className="tr">
              {tabButtons.map(t=>(
                <button key={t.id} className={`tb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
              ))}
            </div>
            {done ? (
              <div style={{textAlign:"center",padding:"60px 0 40px"}}>
                <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#FF7835,#FF3D6B)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 28px",fontSize:34,color:"#fff"}}>✓</div>
                <p style={{fontFamily:"'DM Sans'",fontSize:11,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"#FF7835",marginBottom:10}}>
                  {tab==="cyc" ? "Booking Request Sent" : "Inquiry Sent"}
                </p>
                <h3 style={{fontFamily:"'Bebas Neue'",fontSize:40,letterSpacing:".04em",marginBottom:6,color:"#0D0D0D"}}>
                  {tab==="cyc" ? "You're Almost In!" : "We'll Be In Touch"}
                </h3>
                <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"#aaa",marginBottom:28,letterSpacing:".1em"}}>Conf# {confNum}</p>
                <p style={{fontFamily:"'DM Sans'",color:"#666",fontSize:15,lineHeight:1.8,maxWidth:500,margin:"0 auto 36px"}}>
                  {tab==="cyc"
                    ? <>Your booking details opened in your email app — just hit <strong>Send</strong>. We'll confirm your slot as soon as your deposit clears.</>
                    : <>Your inquiry details opened in your email app — just hit <strong>Send</strong>. We'll be in touch within 24 hours.</>
                  }
                </p>
                {tab==="cyc" && clientCalLink && (
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,marginBottom:36}}>
                    <a href={clientCalLink} target="_blank" rel="noopener noreferrer" style={{
                      display:"inline-flex",alignItems:"center",gap:10,
                      background:"linear-gradient(135deg,#FF7835,#FF3D6B)",borderRadius:100,
                      padding:"14px 28px",fontFamily:"'DM Sans'",fontSize:14,fontWeight:600,
                      color:"#fff",textDecoration:"none",letterSpacing:".01em"
                    }}>
                      📅 Save Date in Google Calendar
                    </a>
                    <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"#aaa"}}>Adds a reminder for your session — booking pending confirmation.</p>
                  </div>
                )}
                <button className="bs" style={{color:"#888",borderColor:"#ddd",padding:"12px 32px",fontSize:13}}
                  onClick={()=>{setDone(false);setCalLink("");setClientCalLink("");setConfNum("");}}>
                  Submit Another
                </button>
              </div>
            ) : tab==="cyc" && enabledServices.cyc !== false ? (
              <CYCForm dur={dur} setDur={setDur} cycAddons={cycAddons} toggleCycAddon={toggleCycAddon}
                cyc={cyc} setCyc={setCyc} onSubmit={submitCYC}
                cycAddonOptions={cycAddonOptions}
                bookingConfig={bookingConfig}
              />
            ) : (
              <ProductionForm addons={addons} toggleAddon={toggleAddon} proj={proj} setProj={setProj}
                crewOptions={crewOptions}
                onSubmit={submitProduction}/>
            )}
          </div>
        </section>
      );
    }

    /* ── CYC Wall Form ──────────────────────────────────────────────────────── */
    function CYCForm({ dur, setDur, cycAddons, toggleCycAddon, cyc, setCyc, sending, onSubmit, cycAddonOptions, bookingConfig }) {
      const [step,      setStep]     = useState(1);
      const [selDate,   setSelDate]  = useState(null);
      const [selTime,   setSelTime]  = useState(null);
      const [calDate,   setCalDate]  = useState(new Date());
      const [payMethod, setPayMethod]= useState(null);
      const [holdSeconds, setHoldSeconds] = useState(300);
      const minHours = Math.max(1, Math.round(numberOr(bookingConfig.minHours, 2)));
      const maxHours = Math.max(minHours, Math.round(numberOr(bookingConfig.maxHours, 12)));
      const hourlyRate = numberOr(bookingConfig.hourlyRate, 100);
      const cleaningFee = numberOr(bookingConfig.cleaningFee, 10);
      const HST_RATE = numberOr(bookingConfig.hstRate, 0.13);
      const weekdayOpen = Math.round(numberOr(bookingConfig.weekdayOpen, 8));
      const weekdayClose = Math.round(numberOr(bookingConfig.weekdayClose, 24));
      const weekendOpen = Math.round(numberOr(bookingConfig.weekendOpen, 10));
      const weekendClose = Math.round(numberOr(bookingConfig.weekendClose, 26));
      const [customHrs, setCustomHrs]= useState(minHours);

      useEffect(() => {
        setCustomHrs(h => Math.min(maxHours, Math.max(minHours, h)));
      }, [minHours, maxHours]);

      useEffect(() => {
        if (step !== 3) {
          setHoldSeconds(300);
          return;
        }
        setHoldSeconds(300);
        const timer = setInterval(() => {
          setHoldSeconds(seconds => Math.max(0, seconds - 1));
        }, 1000);
        return () => clearInterval(timer);
      }, [step]);

      const durationOptions = DURATIONS.map(d => {
        if (d.key === "custom") {
          return { ...d, sub:`Choose your hours (${minHours}-${maxHours})`, price:"", hrs:0 };
        }
        const adjustedHrs = Math.min(maxHours, Math.max(minHours, d.hrs));
        return { ...d, hrs: adjustedHrs, price: `$${adjustedHrs * hourlyRate}` };
      });

      const durObj  = durationOptions.find(d => d.key === dur) || durationOptions[0];
      const hrs     = dur === "custom" ? customHrs : durObj.hrs;
      const studioTotal  = hrs * hourlyRate;
      const selectedAddonItems = cycAddonOptions.filter(a => cycAddons.includes(a.id));
      const addonTotal = selectedAddonItems.reduce((sum, a) => sum + parseAddonRate(a.rate, 0), 0);
      const subtotal     = studioTotal + cleaningFee + addonTotal;
      const hst          = Math.round(subtotal * HST_RATE * 100) / 100;
      const grandTotal   = Math.round((subtotal + hst) * 100) / 100;
      const deposit      = 100;
      const dueNow       = Math.round((deposit + cleaningFee + hst) * 100) / 100;
      const balanceDue   = Math.round((grandTotal - dueNow) * 100) / 100;

      const today = new Date(); today.setHours(0,0,0,0);
      const year  = calDate.getFullYear();
      const month = calDate.getMonth();
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const CAL_DAYS    = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      const selectedDow = selDate ? selDate.getDay() : null;
      const isWeekend = selectedDow === 0 || selectedDow === 6;
      const dayOpen = isWeekend ? weekendOpen : weekdayOpen;
      const dayClose = normalizeCloseHour(dayOpen, isWeekend ? weekendClose : weekdayClose);

      // Generate start times from admin-configured studio hours.
      const timeSlots = (() => {
        const slots = [];
        if (!selDate) return slots;
        for (let h = dayOpen; h + hrs <= dayClose; h++) {
          slots.push(formatClockHour(h));
        }
        return slots;
      })();

      function addHrs(timeStr, h) {
        if (!timeStr) return "";
        const parts = timeStr.split(" ");
        const [hStr, mStr] = parts[0].split(":");
        let hr = parseInt(hStr, 10);
        const ampm = parts[1];
        if (ampm === "PM" && hr !== 12) hr += 12;
        if (ampm === "AM" && hr === 12) hr = 0;
        hr += h;
        const outAmpm = hr >= 12 && hr < 24 ? "PM" : "AM";
        let out = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr;
        return out + ":00 " + outAmpm;
      }

      function fmtDate(d) {
        if (!d) return "";
        const wd = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
        const mn = monthNames[d.getMonth()].slice(0,3);
        return wd + ", " + mn + " " + d.getDate() + " " + d.getFullYear();
      }

      const METHODS = [
        { id:"apple",     label:"Apple Pay",   icon:"🍎" },
        { id:"google",    label:"Google Pay",  icon:"G"  },
        { id:"paypal",    label:"PayPal",      icon:"🅿"  },
        { id:"etransfer", label:"E-Transfer",  icon:"📧"  },
      ];

      const gradTxt = { background:"linear-gradient(135deg,#FF7835,#FF3D6B)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" };

      /* ─── Step 1: Duration + Calendar + Time ─── */
      const Step1 = (
        <div>
          <p style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".06em",marginBottom:22,color:"#0D0D0D"}}>SELECT DURATION</p>
          <div className="dur-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
            {durationOptions.map(d=>(
              <button key={d.key} className={`dc${dur===d.key?" on":""}`} onClick={()=>{setDur(d.key);setSelTime(null);}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:".04em",color:"#0D0D0D",marginBottom:4}}>{d.label}</div>
                <div style={{fontFamily:"'DM Sans'",fontSize:11,color:"#888",marginBottom:10}}>{d.sub}</div>
                {d.key === "custom"
                  ? <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:".04em",...gradTxt}}>{money(hourlyRate)}/hr</div>
                  : <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".04em",...gradTxt}}>{d.price}</div>
                }
              </button>
            ))}
          </div>
          {/* Custom hour stepper */}
          {dur === "custom" && (
            <div style={{display:"flex",alignItems:"center",gap:16,background:"#FFF5F7",border:"1.5px solid #FF3D6B",borderRadius:12,padding:"16px 20px",marginBottom:16}}>
              <span style={{fontFamily:"'DM Sans'",fontSize:13,fontWeight:600,color:"#0D0D0D",flex:1}}>Hours needed <span style={{color:"#aaa",fontWeight:400}}>(2 min)</span></span>
              <div style={{display:"flex",alignItems:"center",gap:0,border:"1.5px solid #e0e0e0",borderRadius:8,overflow:"hidden",background:"#fff"}}>
                <button onClick={()=>setCustomHrs(h=>Math.max(minHours,h-1))} style={{width:36,height:36,border:"none",background:"transparent",fontSize:18,cursor:"pointer",color:customHrs<=minHours?"#ccc":"#0D0D0D",fontWeight:300}}>−</button>
                <span style={{width:40,textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:".04em",color:"#0D0D0D"}}>{customHrs}</span>
                <button onClick={()=>setCustomHrs(h=>Math.min(maxHours,h+1))} style={{width:36,height:36,border:"none",background:"transparent",fontSize:18,cursor:"pointer",color:customHrs>=maxHours?"#ccc":"#0D0D0D",fontWeight:300}}>+</button>
              </div>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:".04em",...gradTxt,minWidth:60,textAlign:"right"}}>${customHrs*hourlyRate}</span>
            </div>
          )}
          <div style={{background:"#F7F6F4",borderRadius:12,padding:"12px 18px",marginBottom:36}}>
            <p style={{fontFamily:"'DM Sans'",fontSize:13,color:"#555",lineHeight:1.6}}>
              <strong style={{color:"#0D0D0D"}}>Included:</strong> Infinity wall + full lighting setup · {money(hourlyRate)}/hr · {minHours}-hr minimum
            </p>
          </div>

          {/* Calendar */}
          <p style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".06em",marginBottom:20,color:"#0D0D0D"}}>SELECT DATE</p>
          <div style={{background:"#F7F6F4",borderRadius:16,padding:"20px 16px",marginBottom:32}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <button onClick={()=>setCalDate(new Date(year,month-1,1))} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#555",padding:"2px 10px",lineHeight:1}}>‹</button>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:19,letterSpacing:".06em",color:"#0D0D0D"}}>{monthNames[month]} {year}</span>
              <button onClick={()=>setCalDate(new Date(year,month+1,1))} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#555",padding:"2px 10px",lineHeight:1}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
              {CAL_DAYS.map(d=>(
                <div key={d} style={{textAlign:"center",fontFamily:"'DM Sans'",fontSize:11,fontWeight:600,color:"#bbb",padding:"4px 0"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
              {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const day = i+1;
                const d   = new Date(year,month,day);
                const isPast = d < today;
                const disabled = isPast;
                const isSat  = d.getDay() === 6;
                const isSel  = selDate && selDate.getTime() === d.getTime();
                return (
                  <button key={day} disabled={disabled} onClick={()=>{setSelDate(d);setSelTime(null);}} style={{
                    padding:"9px 2px",borderRadius:8,border:"none",
                    cursor:disabled?"not-allowed":"pointer",
                    background:isSel?"linear-gradient(135deg,#FF7835,#FF3D6B)":"transparent",
                    color:isSel?"#fff":disabled?"#d0d0d0":isSat?"#FF7835":"#0D0D0D",
                    fontFamily:"'DM Sans'",fontSize:13,fontWeight:isSel?700:400,
                    transition:"background .15s,color .15s"
                  }}>{day}</button>
                );
              })}
            </div>
          </div>

          {/* Time slots */}
          {selDate && (
            <div style={{marginBottom:40}}>
              <p style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".06em",marginBottom:16,color:"#0D0D0D"}}>SELECT START TIME</p>
              <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"#888",marginBottom:12}}>
                Operating hours: {formatClockHour(dayOpen)} - {formatClockHour(dayClose)} {isWeekend ? "(Sat - Sun)" : "(Mon - Fri)"}
              </p>
              {timeSlots.length === 0 && (
                <p style={{fontFamily:"'DM Sans'",fontSize:13,color:"#D91E8C",marginBottom:12}}>
                  No available start times for this duration within current operating hours.
                </p>
              )}
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                {timeSlots.map(t=>(
                  <button key={t} className={`cp${selTime===t?" on":""}`} onClick={()=>setSelTime(t)}>
                    {t} – {addHrs(t, hrs)}
                  </button>
                ))}
              </div>
            </div>
          )}

          <button className="bp" style={{width:"100%",padding:18,fontSize:16,opacity:(!selDate||!selTime)?0.45:1,transition:"opacity .2s"}}
            disabled={!selDate||!selTime} onClick={()=>setStep(2)}>
            Next: Add-Ons →
          </button>
        </div>
      );

      /* ─── Step 2: Add-ons ─── */
      const Step2 = (
        <div>
          <p style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".06em",marginBottom:8,color:"#0D0D0D"}}>ADD-ONS</p>
          <p style={{fontFamily:"'DM Sans'",fontSize:13,color:"#888",marginBottom:20}}>Optional — select what you need, rates included on quote</p>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:44}}>
            {cycAddonOptions.map(a=>{
              const on = cycAddons.includes(a.id);
              const addonRate = parseAddonRate(a.rate, 0);
              return (
                <button key={a.id} onClick={()=>toggleCycAddon(a.id)} style={{
                  display:"flex",alignItems:"center",gap:16,
                  padding:"14px 18px",borderRadius:12,
                  border:"1.5px solid "+(on?"#FF3D6B":"#E8E8E8"),
                  background:on?"#FFF5F7":"#fff",cursor:"pointer",textAlign:"left",transition:"all .2s"
                }}>
                  <div style={{
                    width:22,height:22,borderRadius:6,flexShrink:0,
                    border:"2px solid "+(on?"#FF3D6B":"#ccc"),
                    background:on?"linear-gradient(135deg,#FF7835,#FF3D6B)":"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"
                  }}>
                    {on && <span style={{color:"#fff",fontSize:12,fontWeight:700,lineHeight:1}}>✓</span>}
                  </div>
                  <div>
                    <div style={{fontFamily:"'DM Sans'",fontSize:14,fontWeight:600,color:on?"#FF3D6B":"#0D0D0D",marginBottom:2}}>{a.label}</div>
                    <div style={{fontFamily:"'DM Sans'",fontSize:12,color:"#888",fontWeight:300}}>{a.desc}</div>
                  </div>
                  <span style={{marginLeft:"auto",fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:".04em",...gradTxt}}>{addonRate > 0 ? money(addonRate) : "Included"}</span>
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:12}}>

    function ChatWidget({ studioInfo }) {
      const [open, setOpen] = useState(false);
      const [messages, setMessages] = useState([
        { role: "bot", text: "Hi, I can help with bookings, hours, pricing, add-ons, studio services, or delivery timelines. If you want a human, I can send your message directly to studio management." },
      ]);
      const [input, setInput] = useState("");
      const [name, setName] = useState(() => localStorage.getItem("rtm_chat_name") || "");
      const [email, setEmail] = useState(() => localStorage.getItem("rtm_chat_email") || "");
      const [visitorId, setVisitorId] = useState(() => localStorage.getItem("rtm_chat_visitor") || `vis_${Math.random().toString(36).slice(2)}`);
      const [threadId, setThreadId] = useState(() => localStorage.getItem("rtm_chat_thread") || "");
      const [loading, setLoading] = useState(false);
      const [handoff, setHandoff] = useState(false);
      const endRef = useRef(null);

      useEffect(() => { localStorage.setItem("rtm_chat_visitor", visitorId); }, [visitorId]);
      useEffect(() => { localStorage.setItem("rtm_chat_name", name); }, [name]);
      useEffect(() => { localStorage.setItem("rtm_chat_email", email); }, [email]);
      useEffect(() => { if (threadId) localStorage.setItem("rtm_chat_thread", threadId); }, [threadId]);

      useEffect(() => {
        if (open && endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" });
      }, [messages, open]);

      const sendMessage = async (text) => {
        const clean = String(text || "").trim();
        if (!clean || loading) return;
        setMessages(prev => [...prev, { role: "user", text: clean }]);
        setInput("");
        setLoading(true);
        try {
          const r = await fetch(`${API_BASE}/chat/message`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ visitor_id: visitorId, name, email, message: clean, source: "website-chat" }),
          });
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || "Chat failed");
          if (d.visitor_id && d.visitor_id !== visitorId) setVisitorId(d.visitor_id);
          if (d.thread_id) setThreadId(String(d.thread_id));
          setMessages(prev => [...prev, { role: "bot", text: d.reply || "Studio management will review your message shortly." }]);
          setHandoff(Boolean(d.handoff));
        } catch (e) {
          setMessages(prev => [...prev, { role: "bot", text: `I could not send that right now. Please email ${cleanText(studioInfo?.studio_email) || CONTACT_EMAIL}.` }]);
        } finally {
          setLoading(false);
        }
      };

      const quickPrompts = [
        "What are your hours?",
        "How do deposits and holds work?",
        "What services do you offer?",
        "I want to talk to studio management",
      ];

      return (
        <>
          {!open && (
            <button className="chat-launch" onClick={()=>setOpen(true)} aria-label="Open chat">
              <span className="chat-fab">💬</span>
              <span style={{fontFamily:"'DM Sans'",fontSize:13,fontWeight:700}}>Chat with RTM</span>
            </button>
          )}
          {open && (
            <div className="chat-shell" role="dialog" aria-label="Round Table Media assistant chat">
              <div className="chat-hd">
                <div>
                  <div className="chat-title">RTM Assistant</div>
                  <div className="chat-sub">FAQ first. Studio management on request.</div>
                </div>
                <button className="chat-close" onClick={()=>setOpen(false)} aria-label="Close chat">×</button>
              </div>
              <div className="chat-body">
                <div className="chat-banner">
                  Ask about bookings, hours, pricing, add-ons, studio services, or delivery timelines. If you want a human, I can send your message directly to studio management.
                </div>
                <div className="chat-quick">
                  {quickPrompts.map(q => <button key={q} onClick={()=>sendMessage(q)} disabled={loading}>{q}</button>)}
                </div>
                {messages.map((m, i) => <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>)}
                <div ref={endRef} />
              </div>
              <div className="chat-form">
                <div className="chat-row">
                  <input className="ri" placeholder="Your name" value={name} onChange={e=>setName(e.target.value)} />
                  <input className="ri" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} />
                </div>
                <textarea className="ri chat-input" rows={3} placeholder={handoff ? "Leave a message for studio management..." : "Type your question..."} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); sendMessage(input);}}} />
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <button className="chat-send" onClick={()=>sendMessage(input)} disabled={loading || !input.trim()}>{loading ? "Sending..." : (handoff ? "Send to management" : "Send message")}</button>
                </div>
                <div className="chat-meta">
                  <span>{handoff ? "Human handoff enabled" : "Automated FAQ assistant"}</span>
                  <span>{cleanText(studioInfo?.studio_email) || CONTACT_EMAIL}</span>
                </div>
                <div className="chat-note">Studio management can review this conversation in the admin portal.</div>
              </div>
            </div>
          )}
        </>
      );
    }

                    <p style={{margin:0}}>130 Westmore Drive<br/>Etobicoke, Unit 2<br/><span style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>Brampton location coming soon</span></p>
                  </div>
                  <div>
                    <p style={{margin:0,color:"rgba(255,255,255,.4)",fontSize:12,letterSpacing:".05em",marginBottom:4}}>📧 EMAIL</p>
                    <a href={`mailto:${studioEmail}`} style={{color:"rgba(255,255,255,.6)",textDecoration:"none",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#FF3D6B"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.6)"}>{studioEmail}</a>
                  </div>
                  <div>
                    <p style={{margin:0,color:"rgba(255,255,255,.4)",fontSize:12,letterSpacing:".05em",marginBottom:4}}>🕐 HOURS</p>
                    <p style={{margin:0}}>Mon - Fri: 8AM - 12AM<br/>Sat - Sun: 10AM-2AM</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Divider */}
            <div style={{borderTop:"1px solid #333",paddingTop:40}}>
              {/* Bottom footer */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:20}}>
                <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,.2)",margin:0}}>
                  © {new Date().getFullYear()} Round Table Media. All rights reserved.
                </p>
                <div style={{display:"flex",gap:28,fontFamily:"'DM Sans'",fontSize:12}}>
                  <a href="./privacy.html" style={{color:"rgba(255,255,255,.3)",textDecoration:"none",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.3)"}>Privacy Policy</a>
                  <a href="./terms.html" style={{color:"rgba(255,255,255,.3)",textDecoration:"none",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.3)"}>Terms of Service</a>
                </div>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ══ ROOT ════════════════════════════════════════════════════════════════ */
    function App() {
      const [scrolled, setScrolled]   = useState(false);
      const [menuOpen, setMenuOpen]   = useState(false);
      const [filter,   setFilter]     = useState("All");
      const [tab,      setTab]        = useState("cyc");
      const [dur,      setDur]        = useState("2hr");
      const [addons,   setAddons]     = useState([]);
      const [cycAddons, setCycAddons] = useState([]);
      const [cyc,      setCyc]        = useState({ name:"", email:"", phone:"", date:"" });
      const [proj,     setProj]       = useState({ name:"", email:"", phone:"", service:"", message:"" });
      const [done,     setDone]       = useState(false);
      const [portfolioItems, setPortfolioItems] = useState(VIDEOS.work);
      const [cycWallItems, setCycWallItems] = useState(VIDEOS.studio);
      const [heroReelSrc, setHeroReelSrc] = useState(VIDEOS.showreel);
      const [siteSettings, setSiteSettings] = useState({
        hourly_rate: 100,
        cleaning_fee: 10,
        hst_rate: 0.13,
        min_hours: 2,
        max_hours: 12,
        studio_open: 8,
        studio_close: 24,
        weekday_open: 8,
        weekday_close: 24,
        weekend_open: 10,
        weekend_close: 26,
        studio_name: "Round Table Media",
        studio_city: "Toronto, Ontario",
        studio_email: CONTACT_EMAIL,
        services: [
          { id:"cyc", label:"Rent the CYC Wall", enabled:true },
          { id:"production", label:"Book a Production", enabled:true },
        ],
        cyc_addons: CYC_ADDONS.map(a => ({ ...a, enabled: true })),
        crew_addons: CREW.map(c => ({ ...c, enabled: true })),
      });

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 60);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);

      // Lock body scroll when mobile menu is open
      useEffect(() => {
        document.body.style.overflow = menuOpen ? "hidden" : "";
      }, [menuOpen]);

      useEffect(() => {
        let cancelled = false;

        const mapPortfolio = (p, i) => ({
          id: p.id || i + 1,
          src: mediaUrl(p.src || ""),
          poster: mediaUrl(p.poster || p.thumbnail || ""),
          title:
            cleanPortfolioTitle(p.title) ||
            titleFromMedia(p.src) ||
            titleFromMedia(p.poster || p.thumbnail) ||
            cleanPortfolioTitle(VIDEOS.work[i]?.title) ||
            "",
          cat: cleanText(p.cat) || cleanText(p.category) || "Music Video",
          order: Number.isFinite(Number(p.order)) ? Number(p.order) : i,
        });

        const mapCyc = (c, i) => ({
          src: mediaUrl(c.src || c.url || ""),
          poster: mediaUrl(c.poster || c.thumbnail || c.url || ""),
          label: c.label || VIDEOS.studio[i]?.label || `CYC Wall ${i + 1}`,
        });

        (async () => {
          try {
            const sr = await fetch(`${API_BASE}/settings`);
            if (sr.ok) {
              const sData = await sr.json();
              if (!cancelled) {
                setSiteSettings(prev => ({
                  ...prev,
                  hourly_rate: numberOr(sData.hourly_rate, prev.hourly_rate),
                  cleaning_fee: numberOr(sData.cleaning_fee, prev.cleaning_fee),
                  hst_rate: numberOr(sData.hst_rate, prev.hst_rate),
                  min_hours: Math.max(1, Math.round(numberOr(sData.min_hours, prev.min_hours))),
                  max_hours: Math.max(1, Math.round(numberOr(sData.max_hours, prev.max_hours))),
                  studio_open: Math.round(numberOr(sData.studio_open ?? sData.weekday_open, prev.studio_open)),
                  studio_close: Math.round(numberOr(sData.studio_close ?? sData.weekday_close, prev.studio_close)),
                  weekday_open: Math.round(numberOr(sData.weekday_open ?? sData.studio_open, prev.weekday_open)),
                  weekday_close: Math.round(numberOr(sData.weekday_close ?? sData.studio_close, prev.weekday_close)),
                  weekend_open: Math.round(numberOr(sData.weekend_open ?? sData.studio_open, prev.weekend_open)),
                  weekend_close: Math.round(numberOr(sData.weekend_close ?? sData.studio_close, prev.weekend_close)),
                  studio_name: cleanText(sData.studio_name) || prev.studio_name,
                  studio_city: cleanText(sData.studio_city) || prev.studio_city,
                  studio_email: cleanText(sData.studio_email) || prev.studio_email,
                  services: Array.isArray(sData.services) && sData.services.length ? sData.services : prev.services,
                  cyc_addons: Array.isArray(sData.cyc_addons) && sData.cyc_addons.length ? sData.cyc_addons : prev.cyc_addons,
                  crew_addons: Array.isArray(sData.crew_addons) && sData.crew_addons.length ? sData.crew_addons : prev.crew_addons,
                }));
              }
              const heroOverride = mediaUrl(cleanText(sData.hero_reel_url || ""));
              if (!cancelled && heroOverride) {
                setHeroReelSrc(heroOverride);
              }
            }
          } catch {}

          try {
            const pr = await fetch(`${API_BASE}/portfolio`);
            if (pr.ok) {
              const data = await pr.json();
              if (!cancelled && Array.isArray(data) && data.length) {
                const normalized = data.map(mapPortfolio).sort((a, b) => a.order - b.order);
                const merged = VIDEOS.work.map((fallback, i) => {
                  const fromAdmin = normalized[i] || {};
                  return {
                    id: fromAdmin.id || fallback.id,
                    src: fromAdmin.src || fallback.src,
                    poster: fromAdmin.poster || fallback.poster,
                    title:
                      cleanPortfolioTitle(fromAdmin.title) ||
                      titleFromMedia(fromAdmin.src) ||
                      titleFromMedia(fromAdmin.poster) ||
                      cleanPortfolioTitle(fallback.title) ||
                      titleFromMedia(fallback.src) ||
                      titleFromMedia(fallback.poster) ||
                      "",
                    cat: cleanText(fromAdmin.cat) || fallback.cat || "Music Video",
                  };
                });
                setPortfolioItems(merged);
              }
            }
          } catch {}

          try {
            const cr = await fetch(`${API_BASE}/cyc-wall`);
            if (cr.ok) {
              const data = await cr.json();
              if (!cancelled && Array.isArray(data) && data.length) {
                const normalized = data.map(mapCyc);
                const merged = VIDEOS.studio.map((fallback, i) => ({
                  src: normalized[i]?.src || fallback.src,
                  poster: normalized[i]?.poster || fallback.poster,
                  label: normalized[i]?.label || fallback.label,
                }));
                setCycWallItems(merged);
              }
            }
          } catch {}
        })();

        return () => {
          cancelled = true;
        };
      }, []);

      const closeMenu = () => setMenuOpen(false);

      const serviceById = Array.isArray(siteSettings.services) ? siteSettings.services.reduce((acc, s) => {
        if (s && s.id) acc[s.id] = s;
        return acc;
      }, {}) : {};
      const enabledServices = {
        cyc: serviceById.cyc ? serviceById.cyc.enabled !== false : true,
        production: serviceById.production ? serviceById.production.enabled !== false : true,
      };
      const serviceLabels = {
        cyc: cleanText(serviceById.cyc?.label) || "Rent the CYC Wall",
        production: cleanText(serviceById.production?.label) || "Book a Production",
      };

      useEffect(() => {
        if (!enabledServices.cyc && tab === "cyc" && enabledServices.production) {
          setTab("production");
        } else if (!enabledServices.production && tab === "production" && enabledServices.cyc) {
          setTab("cyc");
        }
      }, [enabledServices.cyc, enabledServices.production, tab]);

      const cycAddonOptions = (Array.isArray(siteSettings.cyc_addons) ? siteSettings.cyc_addons : [])
        .filter(a => a && a.enabled !== false && cleanText(a.label))
        .map((a, i) => ({
          id: cleanText(a.id) || `addon_${i}`,
          label: cleanText(a.label),
          desc: cleanText(a.desc),
          rate: parseAddonRate(a.rate, CYC_ADDONS.find(x => x.id === (cleanText(a.id) || ""))?.rate || 0),
        }));

      const crewOptions = (Array.isArray(siteSettings.crew_addons) ? siteSettings.crew_addons : [])
        .filter(c => c && c.enabled !== false && cleanText(c.label))
        .map(c => ({ label: cleanText(c.label), rate: cleanText(c.rate) || "Rate on quote" }));

      const bookingConfig = {
        hourlyRate: numberOr(siteSettings.hourly_rate, 100),
        cleaningFee: numberOr(siteSettings.cleaning_fee, 10),
        hstRate: numberOr(siteSettings.hst_rate, 0.13),
        minHours: Math.max(1, Math.round(numberOr(siteSettings.min_hours, 2))),
        maxHours: Math.max(1, Math.round(numberOr(siteSettings.max_hours, 12))),
        weekdayOpen: Math.round(numberOr(siteSettings.weekday_open, 8)),
        weekdayClose: Math.round(numberOr(siteSettings.weekday_close, 24)),
        weekendOpen: Math.round(numberOr(siteSettings.weekend_open, 10)),
        weekendClose: Math.round(numberOr(siteSettings.weekend_close, 26)),
      };

      const toggleAddon    = a => setAddons(p    => p.includes(a) ? p.filter(x=>x!==a) : [...p,a]);
      const toggleCycAddon = a => setCycAddons(p => p.includes(a) ? p.filter(x=>x!==a) : [...p,a]);
      const filtered = filter === "All" ? portfolioItems : portfolioItems.filter(w => w.cat === filter);

      return (
        <>
          <style>{CSS}</style>

          <nav className={scrolled ? "sc" : ""}>
            <a href="#hero" style={{display:"flex",alignItems:"center"}} onClick={closeMenu}>
              <img src={LOGO_SRC} alt="Round Table Media" style={{height:44,width:"auto",objectFit:"contain",filter:scrolled?"none":"drop-shadow(0 1px 6px rgba(0,0,0,.55))",transition:"filter .3s"}}/>
            </a>
            <div className="nav-links" style={{display:"flex",gap:36,alignItems:"center"}}>
              {["Work","About","Services","Studio","Book"].map(l=>(
                <a key={l} href={`#${l.toLowerCase()}`} className="nl">{l}</a>
              ))}
              <a href="#book"><button className="nbtn">Book Now</button></a>
            </div>
            <button className={`hbg${menuOpen?" open":""}`} onClick={()=>setMenuOpen(o=>!o)} aria-label="Menu">
              <span/><span/><span/>
            </button>
          </nav>

          {/* Mobile drawer */}
          <div className={`mob-menu${menuOpen?" open":""}`}>
            {["Work","About","Services","Studio","Book"].map(l=>(
              <a key={l} href={`#${l.toLowerCase()}`} onClick={closeMenu}>{l}</a>
            ))}
            <a href="#book" onClick={closeMenu}><button className="nbtn">Book Now</button></a>
          </div>

          <section id="hero" style={{minHeight:"100vh",padding:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",background:"#0D0D0D"}}>
            {heroReelSrc
              ? <HeroVideo src={heroReelSrc}/>
              : <div style={{position:"absolute",inset:0,background:"linear-gradient(145deg,#0D0D0D 0%,#1c0a2e 55%,#0d0808 100%)"}}/>
            }
            {[
              {top:"-12%",left:"-6%",sz:540,g:"linear-gradient(135deg,#FF783522,#FF3D6B35)",b:BLOBS[0],d:0},
              {top:"40%", right:"-8%",sz:430,g:"linear-gradient(135deg,#7B2FBE28,#D91E8C1c)",b:BLOBS[1],d:.18},
              {bottom:"-15%",left:"20%",sz:390,g:"linear-gradient(135deg,#D91E8C18,#FF783520)",b:BLOBS[2],d:.34},
            ].map((x,i)=>(
              <div key={i} className="blob" style={{
                position:"absolute",width:x.sz,height:x.sz,
                top:x.top,left:x.left,right:x.right,bottom:x.bottom,
                background:x.g,borderRadius:x.b,pointerEvents:"none",
                animation:`splashIn .95s cubic-bezier(.34,1.56,.64,1) ${x.d}s forwards`,opacity:0,
              }}/>
            ))}
            <div className="hero-stack" style={{position:"relative",zIndex:3,textAlign:"center",padding:"0 24px",maxWidth:980}}>
              <p style={{fontFamily:"'DM Sans'",fontSize:10.5,fontWeight:600,letterSpacing:".28em",textTransform:"uppercase",color:"#FF7835",marginBottom:28}}>Round Table Media</p>
              <h1 style={{fontFamily:"'Bebas Neue'",fontSize:"clamp(68px,10.5vw,136px)",letterSpacing:".01em",lineHeight:.87,color:"#fff",marginBottom:34}}>
                We Make<br/>
                <span style={{background:"linear-gradient(135deg,#FF7835,#FF3D6B,#D91E8C)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>It Move.</span>
              </h1>
              <p style={{fontFamily:"'DM Sans'",fontSize:17,fontWeight:300,color:"rgba(255,255,255,.52)",maxWidth:460,margin:"0 auto 46px",lineHeight:1.66}}>
                Music videos. Brand campaigns. Full productions.<br/>Built in Toronto, made for everywhere.
              </p>
              <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
                <a href="#work"><button className="bp">See Our Work</button></a>
                <a href="#book"><button className="bs">Book a Session</button></a>
              </div>
            </div>
            <div style={{position:"absolute",bottom:38,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:10,zIndex:3}}>
              <p style={{fontFamily:"'DM Sans'",fontSize:9.5,letterSpacing:".2em",color:"rgba(255,255,255,.28)",textTransform:"uppercase"}}>Scroll</p>
              <div style={{width:1,height:52,background:"linear-gradient(#FF3D6B80,transparent)"}}/>
            </div>
          </section>

          <WorkSection filter={filter} setFilter={setFilter} items={filtered}/>
          <AboutSection/>
          <ServicesSection/>
          <StudioSection setTab={setTab} items={cycWallItems} enabledServices={enabledServices}/>
          <BookSection
            tab={tab} setTab={setTab}
            dur={dur} setDur={setDur}
            addons={addons} toggleAddon={toggleAddon}
            cycAddons={cycAddons} toggleCycAddon={toggleCycAddon}
            cyc={cyc} setCyc={setCyc}
            proj={proj} setProj={setProj}
            done={done} setDone={setDone}
            enabledServices={enabledServices}
            serviceLabels={serviceLabels}
            cycAddonOptions={cycAddonOptions}
            crewOptions={crewOptions}
            bookingConfig={bookingConfig}
            studioEmail={cleanText(siteSettings.studio_email) || CONTACT_EMAIL}
          />
          <Footer studioInfo={siteSettings}/>
          <ChatWidget studioInfo={siteSettings}/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
