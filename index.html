    function useInView(t = 0.1) {
      const ref = useRef(null);
      const [v, sv] = useState(false);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) sv(true); }, { threshold: t });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, [t]);
      return [ref, v];
    }

    /* ── Hero video (ref-forced muted + play for all browsers) ─────────────── */
    function HeroVideo({ src }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const v = ref.current;
        if (!v) return;
        v.muted = true;
        v.setAttribute('muted', '');
        v.controls = false;
        v.onloadedmetadata = () => { v.play().catch(() => {}); };
        if (v.readyState >= 1) v.play().catch(() => {});
      }, []);
      return (
        <video
          ref={ref}
          autoPlay
          muted
          loop
          playsInline
          controls={false}
          crossOrigin="anonymous"
          src={src}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:.45}}
        />
      );
    }

          {children}
        </div>
      );
    }

    function AnimatedBar({ pct, grad, inView, delay = 0 }) {
      return (
        <div style={{background:"rgba(255,255,255,.1)",borderRadius:6,height:6,overflow:"hidden",width:"100%"}}>
          <div style={{
            height:"100%",
            width: inView ? `${pct}%` : "0%",
            background: grad,
            borderRadius: 6,
            transition: inView ? `width 1.1s cubic-bezier(.4,0,.2,1) ${delay}s` : "none"
          }}/>
        </div>
      );
    }

    function CountUp({ target, suffix="", inView }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!inView) return;
        let start = 0;
        const step = Math.ceil(target / 40);
        const t = setInterval(() => {
          start += step;
          if (start >= target) { setVal(target); clearInterval(t); }
          else setVal(start);
        }, 30);
        return () => clearInterval(t);
      }, [inView, target]);
      return <span>{val}{suffix}</span>;
    }

    function BookSection({ tab, setTab, dur, setDur, addons, toggleAddon, cycAddons, toggleCycAddon, cyc, setCyc, proj, setProj, done, setDone }) {
      const [ref, inView] = useInView(0.05);
      const [calLink,  setCalLink]  = useState("");
      const [confNum,  setConfNum]  = useState("");
      const [clientCalLink, setClientCalLink] = useState("");

      function makeConfNum() {
        return "RTM-" + Date.now().toString(36).toUpperCase().slice(-6);
      }

      // Build a Google Calendar deep-link — zero API, just their URL scheme
      function buildCalLink({ title, dateObj, startTime, hrs, notes }) {
        if (!dateObj || !startTime) return "";
        const parts = startTime.split(" ");
        const [hStr] = parts[0].split(":");
        let h = parseInt(hStr, 10);
        if (parts[1] === "PM" && h !== 12) h += 12;
        if (parts[1] === "AM" && h === 12) h = 0;
        const pad = n => String(n).padStart(2,"0");
        const yr = dateObj.getFullYear();
        const mo = pad(dateObj.getMonth()+1);
        const dy = pad(dateObj.getDate());
        const s = `${yr}${mo}${dy}T${pad(h)}0000`;
        const e = `${yr}${mo}${dy}T${pad(h+hrs)}0000`;
        return `https://calendar.google.com/calendar/render?action=TEMPLATE`
          + `&text=${encodeURIComponent(title)}`
          + `&dates=${s}/${e}`
          + `&details=${encodeURIComponent(notes)}`
          + `&location=${encodeURIComponent("Round Table Media Studio, Toronto ON")}`;
      }

      const [submitting, setSubmitting] = useState(false);
      const [submitErr,  setSubmitErr]  = useState("");

      async function submitCYC({ selDate, selTime, hrs, durLabel, dueNow, grandTotal, selectedAddons, payMethod }) {
        setSubmitting(true); setSubmitErr("");
        try {
          const dateStr = selDate ? selDate.toLocaleDateString("en-CA") : "";
          const addOnList = selectedAddons.length
            ? selectedAddons.map(id => CYC_ADDONS.find(a=>a.id===id)?.label).join(", ")
            : "None";
          const studio_total = hrs * 100 + 10;
          const hst          = Math.round(studio_total * 0.13 * 100) / 100;
          const res = await fetch(`${API_BASE}/booking`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              name: cyc.name, email: cyc.email, phone: cyc.phone || null,
              date_str: dateStr, start_time: selTime, hrs, dur_label: durLabel,
              addons: addOnList, pay_method: payMethod,
              studio_total, hst, grand_total: grandTotal,
              deposit: 100, balance_due: Math.round((grandTotal - dueNow)*100)/100,
            }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "Server error");

          // Build Google Calendar link for the client
          const clientCal = buildCalLink({
            title: "Round Table Media — CYC Wall Booking",
            dateObj: selDate, startTime: selTime, hrs,
            notes: [
              `Conf#: ${data.conf}`, `Duration: ${durLabel} (${hrs}h)`,
              `Add-ons: ${addOnList}`,
              `Deposit paid: $${dueNow.toFixed(2)}`,
              `Balance due on arrival: $${(grandTotal-dueNow).toFixed(2)}`,
              "Questions? bookings@roundtablemedia.ca",
            ].join("\n"),
          });
          setClientCalLink(clientCal);
          setConfNum(data.conf);
          setDone(true);
        } catch(e) {
          setSubmitErr("Booking failed — " + e.message + ". Please email " + CONTACT_EMAIL);
        } finally {
          setSubmitting(false);
        }
      }

      async function submitProduction() {
        if (!proj.name || !proj.email) { setSubmitErr("Name and email are required."); return; }
        setSubmitting(true); setSubmitErr("");
        try {
          const crewList = addons.length ? addons.join(", ") : "None";
          const res = await fetch(`${API_BASE}/production`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              name: proj.name, email: proj.email, phone: proj.phone || null,
              project_type: proj.service || null, crew_addons: crewList,
              message: proj.message || null,
            }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "Server error");
          setConfNum(data.conf);
          setDone(true);
        } catch(e) {
          setSubmitErr("Submission failed — " + e.message + ". Please email " + CONTACT_EMAIL);
        } finally {
          setSubmitting(false);
        }
      }

      return (
        <section id="book" className="sec" ref={ref} style={{background:"#fff"}}>
          <div style={{maxWidth:860,margin:"0 auto"}}>
            <p className="sl">Book</p>
            <h2 className="sh" style={{marginBottom:48}}>Let's Work<br/>Together</h2>
            <div className="tr">
              {[{id:"cyc",label:"Rent the CYC Wall"},{id:"production",label:"Book a Production"}].map(t=>(
                <button key={t.id} className={`tb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
              ))}
            </div>
            {done ? (
              <div style={{textAlign:"center",padding:"60px 0 40px"}}>
                <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#FF7835,#FF3D6B)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 28px",fontSize:34,color:"#fff"}}>✓</div>
                <p style={{fontFamily:"'DM Sans'",fontSize:11,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"#FF7835",marginBottom:10}}>
                  {tab==="cyc" ? "Booking Request Sent" : "Inquiry Sent"}
                </p>
                <h3 style={{fontFamily:"'Bebas Neue'",fontSize:40,letterSpacing:".04em",marginBottom:6,color:"#0D0D0D"}}>
                  {tab==="cyc" ? "You're Almost In!" : "We'll Be In Touch"}
                </h3>
                <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"#aaa",marginBottom:28,letterSpacing:".1em"}}>Conf# {confNum}</p>
                <p style={{fontFamily:"'DM Sans'",color:"#666",fontSize:15,lineHeight:1.8,maxWidth:500,margin:"0 auto 36px"}}>
                  {tab==="cyc"
                    ? <>Your booking details opened in your email app — just hit <strong>Send</strong>. We'll confirm your slot as soon as your deposit clears.</>
                    : <>Your inquiry details opened in your email app — just hit <strong>Send</strong>. We'll be in touch within 24 hours.</>
                  }
                </p>
                {tab==="cyc" && clientCalLink && (
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,marginBottom:36}}>
                    <a href={clientCalLink} target="_blank" rel="noopener noreferrer" style={{
                      display:"inline-flex",alignItems:"center",gap:10,
                      background:"linear-gradient(135deg,#FF7835,#FF3D6B)",borderRadius:100,
                      padding:"14px 28px",fontFamily:"'DM Sans'",fontSize:14,fontWeight:600,
                      color:"#fff",textDecoration:"none",letterSpacing:".01em"
                    }}>
                      📅 Save Date in Google Calendar
                    </a>
                    <p style={{fontFamily:"'DM Sans'",fontSize:12,color:"#aaa"}}>Adds a reminder for your session — booking pending confirmation.</p>
                  </div>
                )}
                <button className="bs" style={{color:"#888",borderColor:"#ddd",padding:"12px 32px",fontSize:13}}
                  onClick={()=>{setDone(false);setCalLink("");setClientCalLink("");setConfNum("");}}>
                  Submit Another
                </button>
              </div>
            ) : tab==="cyc" ? (
              <CYCForm dur={dur} setDur={setDur} cycAddons={cycAddons} toggleCycAddon={toggleCycAddon}
                cyc={cyc} setCyc={setCyc} onSubmit={submitCYC}/>
            ) : (
              <ProductionForm addons={addons} toggleAddon={toggleAddon} proj={proj} setProj={setProj}
                onSubmit={submitProduction}/>
            )}
          </div>
        </section>
      );
    }

    /* ── CYC Wall Form ──────────────────────────────────────────────────────── */
    function CYCForm({ dur, setDur, cycAddons, toggleCycAddon, cyc, setCyc, sending, onSubmit }) {
      const [step,      setStep]     = useState(1);
      const [selDate,   setSelDate]  = useState(null);
      const [selTime,   setSelTime]  = useState(null);
      const [calDate,   setCalDate]  = useState(new Date());
      const [payMethod, setPayMethod]= useState(null);
      const [customHrs, setCustomHrs]= useState(2);

      const durObj  = DURATIONS.find(d => d.key === dur) || DURATIONS[0];
      const hrs     = dur === "custom" ? customHrs : durObj.hrs;
      const HST_RATE     = 0.13;
      const studioTotal  = hrs * 100;
      const cleaningFee  = 10;
      const subtotal     = studioTotal + cleaningFee;
      const hst          = Math.round(subtotal * HST_RATE * 100) / 100;
      const grandTotal   = Math.round((subtotal + hst) * 100) / 100;
      const deposit      = 100;
      const dueNow       = Math.round((deposit + cleaningFee + hst) * 100) / 100;
      const balanceDue   = Math.round((grandTotal - dueNow) * 100) / 100;

      const today = new Date(); today.setHours(0,0,0,0);
      const year  = calDate.getFullYear();
      const month = calDate.getMonth();
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const CAL_DAYS    = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      // Generate start times: studio closes at 10 PM (22:00), so last start = 22 - hrs
      const studioOpen = 9; // 9 AM
      const studioClose = 22; // 10 PM
      const timeSlots = (() => {
        const slots = [];
        for (let h = studioOpen; h + hrs <= studioClose; h++) {
          const ampm = h >= 12 ? "PM" : "AM";
          const display = h > 12 ? h - 12 : h === 0 ? 12 : h;
          slots.push(display + ":00 " + ampm);
        }
        return slots;
      })();

      function addHrs(timeStr, h) {
        if (!timeStr) return "";
        const parts = timeStr.split(" ");
        const [hStr, mStr] = parts[0].split(":");
        let hr = parseInt(hStr, 10);
        const ampm = parts[1];
        if (ampm === "PM" && hr !== 12) hr += 12;
        if (ampm === "AM" && hr === 12) hr = 0;
        hr += h;
        const outAmpm = hr >= 12 && hr < 24 ? "PM" : "AM";
        let out = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr;
        return out + ":00 " + outAmpm;
      }

      function fmtDate(d) {
        if (!d) return "";
        const wd = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
        const mn = monthNames[d.getMonth()].slice(0,3);
        return wd + ", " + mn + " " + d.getDate() + " " + d.getFullYear();
      }

      const METHODS = [
        { id:"apple",     label:"Apple Pay",   icon:"🍎" },
        { id:"google",    label:"Google Pay",  icon:"G"  },
        { id:"paypal",    label:"PayPal",      icon:"🅿"  },
        { id:"etransfer", label:"E-Transfer",  icon:"📧"  },
      ];

      const gradTxt = { background:"linear-gradient(135deg,#FF7835,#FF3D6B)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" };

      /* ─── Step 1: Duration + Calendar + Time ─── */
      const Step1 = (
        <div>
          <p style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".06em",marginBottom:22,color:"#0D0D0D"}}>SELECT DURATION</p>
          <div className="dur-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
            {DURATIONS.map(d=>(
              <button key={d.key} className={`dc${dur===d.key?" on":""}`} onClick={()=>{setDur(d.key);setSelTime(null);}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:".04em",color:"#0D0D0D",marginBottom:4}}>{d.label}</div>
                <div style={{fontFamily:"'DM Sans'",fontSize:11,color:"#888",marginBottom:10}}>{d.sub}</div>
                {d.key === "custom"
                  ? <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:".04em",...gradTxt}}>$100/hr</div>
                  : <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:".04em",...gradTxt}}>{d.price}</div>
                }
              </button>
            ))}
          </div>
          {/* Custom hour stepper */}
          {dur === "custom" && (
            <div style={{display:"flex",alignItems:"center",gap:16,background:"#FFF5F7",border:"1.5px solid #FF3D6B",borderRadius:12,padding:"16px 20px",marginBottom:16}}>

                const d   = new Date(year,month,day);

                const isSat  = d.getDay() === 6;

          <p style={{fontFamily:"'DM Sans'",fontSize:11.5,color:"#bbb",textAlign:"center",marginTop:12}}>Deposit is non-refundable within 48 hrs of your booking date.</p>

      /* ─── Step progress bar ─── */
      const STEP_LABELS = ["Date & Time","Add-Ons","Review & Pay"];
      return (
        <div>
          {/* Progress indicator */}
          <div style={{display:"flex",alignItems:"center",marginBottom:40}}>
            {STEP_LABELS.map((label,i)=>{
              const num  = i+1;
              const done = step > num;
              const active = step === num;
              return (
                <React.Fragment key={label}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,opacity:active||done?1:.38}}>
                    <div style={{
                      width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                      background:done?"linear-gradient(135deg,#FF7835,#FF3D6B)":active?"#0D0D0D":"transparent",
                      border:done||active?"none":"2px solid #ccc",transition:"all .25s"
                    }}>
                      {done
                        ? <span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>
                        : <span style={{fontFamily:"'Bebas Neue'",fontSize:15,color:active?"#fff":"#bbb"}}>{num}</span>
                      }
                    </div>
                    <span style={{fontFamily:"'DM Sans'",fontSize:11,fontWeight:500,color:active?"#0D0D0D":"#aaa",whiteSpace:"nowrap"}}>{label}</span>
                  </div>
                  {i < STEP_LABELS.length-1 && (
                    <div style={{flex:1,height:2,borderRadius:2,margin:"0 8px",marginBottom:20,background:step>i+1?"linear-gradient(90deg,#FF7835,#FF3D6B)":"#e8e8e8",transition:"background .4s"}}/>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {step===1 && Step1}
          {step===2 && Step2}
          {step===3 && Step3}
        </div>
      );
    }

    /* ══ ROOT ════════════════════════════════════════════════════════════════ */
    function App() {

      const [menuOpen, setMenuOpen]   = useState(false);
      const [filter,   setFilter]     = useState("All");
      const [tab,      setTab]        = useState("cyc");
      const [dur,      setDur]        = useState("2hr");
      const [addons,   setAddons]     = useState([]);
      const [cycAddons, setCycAddons] = useState([]);
      const [cyc,      setCyc]        = useState({ name:"", email:"", phone:"", date:"" });
      const [proj,     setProj]       = useState({ name:"", email:"", phone:"", service:"", message:"" });
      const [done,     setDone]       = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 60);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);

      // Lock body scroll when mobile menu is open
      useEffect(() => {
        document.body.style.overflow = menuOpen ? "hidden" : "";
      }, [menuOpen]);

      const closeMenu = () => setMenuOpen(false);

      const toggleAddon    = a => setAddons(p    => p.includes(a) ? p.filter(x=>x!==a) : [...p,a]);
      const toggleCycAddon = a => setCycAddons(p => p.includes(a) ? p.filter(x=>x!==a) : [...p,a]);
      const filtered = filter === "All" ? VIDEOS.work : VIDEOS.work.filter(w => w.cat === filter);

      return (
        <>
          <style>{CSS}</style>

          <nav className={scrolled ? "sc" : ""}>
            <a href="#hero" style={{display:"flex",alignItems:"center"}} onClick={closeMenu}>
              <img src={LOGO_SRC} alt="Round Table Media" style={{height:44,width:"auto",objectFit:"contain",filter:scrolled?"none":"drop-shadow(0 1px 6px rgba(0,0,0,.55))",transition:"filter .3s"}}/>
            </a>
            <div className="nav-links" style={{display:"flex",gap:36,alignItems:"center"}}>
              {["Work","About","Services","Studio","Book"].map(l=>(
                <a key={l} href={`#${l.toLowerCase()}`} className="nl">{l}</a>
              ))}
              <a href="#book"><button className="nbtn">Book Now</button></a>
            </div>
            <button className={`hbg${menuOpen?" open":""}`} onClick={()=>setMenuOpen(o=>!o)} aria-label="Menu">
              <span/><span/><span/>
            </button>
          </nav>

          {/* Mobile drawer */}
          <div className={`mob-menu${menuOpen?" open":""}`}>
            {["Work","About","Services","Studio","Book"].map(l=>(
              <a key={l} href={`#${l.toLowerCase()}`} onClick={closeMenu}>{l}</a>
            ))}
            <a href="#book" onClick={closeMenu}><button className="nbtn">Book Now</button></a>
          </div>

          <section id="hero" style={{minHeight:"100vh",padding:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",background:"#0D0D0D"}}>
            {VIDEOS.showreel
              ? <HeroVideo src={VIDEOS.showreel}/>
              : <div style={{position:"absolute",inset:0,background:"linear-gradient(145deg,#0D0D0D 0%,#1c0a2e 55%,#0d0808 100%)"}}/>
            }
            {[
              {top:"-12%",left:"-6%",sz:540,g:"linear-gradient(135deg,#FF783522,#FF3D6B35)",b:BLOBS[0],d:0},
              {top:"40%", right:"-8%",sz:430,g:"linear-gradient(135deg,#7B2FBE28,#D91E8C1c)",b:BLOBS[1],d:.18},
              {bottom:"-15%",left:"20%",sz:390,g:"linear-gradient(135deg,#D91E8C18,#FF783520)",b:BLOBS[2],d:.34},
            ].map((x,i)=>(
              <div key={i} className="blob" style={{
                position:"absolute",width:x.sz,height:x.sz,
                top:x.top,left:x.left,right:x.right,bottom:x.bottom,
                background:x.g,borderRadius:x.b,pointerEvents:"none",
                animation:`splashIn .95s cubic-bezier(.34,1.56,.64,1) ${x.d}s forwards`,opacity:0,
              }}/>
            ))}
            <div className="hero-stack" style={{position:"relative",zIndex:3,textAlign:"center",padding:"0 24px",maxWidth:980}}>
              <p style={{fontFamily:"'DM Sans'",fontSize:10.5,fontWeight:600,letterSpacing:".28em",textTransform:"uppercase",color:"#FF7835",marginBottom:28}}>Round Table Media — Toronto</p>
              <h1 style={{fontFamily:"'Bebas Neue'",fontSize:"clamp(68px,10.5vw,136px)",letterSpacing:".01em",lineHeight:.87,color:"#fff",marginBottom:34}}>
                We Make<br/>
                <span style={{background:"linear-gradient(135deg,#FF7835,#FF3D6B,#D91E8C)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>It Move.</span>
              </h1>
              <p style={{fontFamily:"'DM Sans'",fontSize:17,fontWeight:300,color:"rgba(255,255,255,.52)",maxWidth:460,margin:"0 auto 46px",lineHeight:1.66}}>
                Music videos. Brand campaigns. Full productions.<br/>Built in Toronto, made for everywhere.
              </p>
              <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
                <a href="#work"><button className="bp">See Our Work</button></a>
                <a href="#book"><button className="bs">Book a Session</button></a>
              </div>
            </div>
            <div style={{position:"absolute",bottom:38,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:10,zIndex:3}}>
              <p style={{fontFamily:"'DM Sans'",fontSize:9.5,letterSpacing:".2em",color:"rgba(255,255,255,.28)",textTransform:"uppercase"}}>Scroll</p>
              <div style={{width:1,height:52,background:"linear-gradient(#FF3D6B80,transparent)"}}/>
            </div>
          </section>

          <WorkSection filter={filter} setFilter={setFilter} items={filtered}/>
          <AboutSection/>
          <ServicesSection/>
          <StudioSection setTab={setTab}/>
          <BookSection
            tab={tab} setTab={setTab}
            dur={dur} setDur={setDur}
            addons={addons} toggleAddon={toggleAddon}
            cycAddons={cycAddons} toggleCycAddon={toggleCycAddon}
            cyc={cyc} setCyc={setCyc}
            proj={proj} setProj={setProj}
            done={done} setDone={setDone}
          />
          <Footer/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
