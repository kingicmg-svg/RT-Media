<!DOCTYPE html>
<html>
<body style="background:#000;margin:0">
<video id="v" muted loop playsinline
  src="./Web Reel-1.mov"
  style="width:100%;height:100vh;object-fit:cover"
></video>
<p style="color:white;position:fixed;top:10px;left:10px;font-family:sans-serif" id="s">loading...</p>
<script>
const v = document.getElementById('v');
const s = document.getElementById('s');
v.muted = true;
v.play().then(() => s.textContent = 'AUTOPLAYING ✓').catch(() => {
  s.textContent = 'Click anywhere to play';
  document.addEventListener('click', () => v.play().then(() => s.textContent = 'PLAYING ✓'), {once:true});
});
v.addEventListener('error', () => s.textContent = 'ERROR: ' + (v.error?.message || 'unknown'));
</script>
</body>
</html>
